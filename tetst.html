<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiveM Whitelist - D'Serra Familia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="landing-view">
        <div class="logo-area">
            <img src="ntah.png" alt="D'Serra Familia Logo" class="main-logo">
            <h1>𝔇 ' 𝔏𝔲𝔠𝔦𝔞𝔫𝔬 𝔉𝔞𝔪𝔦𝔩𝔦𝔞</h1>
            <p>Roleplay Community</p>
        </div>
        <button class="btn-masuk-awal" onclick="bukaForm()">MULAI PENDAFTARAN</button>
    </div>

    <div id="registration-view" class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <img src="ntah.png" alt="D'Serra Familia Logo" class="mini-logo">
                <p>Formulir Whitelist</p>
            </div>
            
            <h2>Pendaftaran Anggota Baru</h2>
            
            <form id="whitelistForm">
                <div class="input-group">
                    <label>Nama Karakter (IC)</label>
                    <input type="text" id="namaIC" placeholder="Contoh: Budi Santoso" required>
                </div>

                <div class="input-group">
                    <label>USERNAME/ID Discord</label>
                    <input type="text" id="idDiscord" placeholder="user#0000" required>
                </div>

                <div class="input-group">
                    <label>Tanggal Lahir (IC)</label>
                    <input type="date" id="umurOOC" required>
                </div>

                <div class="input-group">
                    <label>Alasan ingin bergabung?</label>
                    <textarea id="ceritaIC" placeholder="(Wajib diisi)"></textarea>
                </div>

                <button type="submit" class="btn-register">Kirim Pendaftaran</button>
                <p class="cancel-text" onclick="kembaliKeHome()">Batal & Kembali</p>
            </form>
        </div>
    </div>

    <script>
        // Logika Perpindahan Halaman
        function bukaForm() {
            document.getElementById('landing-view').style.display = 'none';
            document.getElementById('registration-view').style.display = 'flex';
        }

        function kembaliKeHome() {
            document.getElementById('landing-view').style.display = 'flex';
            document.getElementById('registration-view').style.display = 'none';
        }

        // Logika Webhook Discord
        document.getElementById('whitelistForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const webhookURL = "https://discord.com/api/webhooks/1497465421790449724/T3MTcY38hQxdaBVU0WyTDmfzKL4jIUrTYMlTLcLwL-QKvXX6n3lOD3ncbkE-6vwi1HoP"; 

            const pesan = {
                username: "𝔇 ' 𝔏𝔲𝔠𝔦𝔞𝔫𝔬 𝔉𝔞𝔪𝔦𝔩𝔦𝔞",
                embeds: [{
                    title: "Anggota Keluarga Baru",
                    color: 16727614,
                    fields: [
                        { name: "Nama IC", value: document.getElementById('namaIC').value, inline: true },
                        { name: "ID Discord", value: document.getElementById('idDiscord').value, inline: true },
                        { name: "tanggl lahir (ic)", value: document.getElementById('umurOOC').value, inline: true },
                        { name: "Alasan", value: document.getElementById('ceritaIC').value }
                    ]
                }]
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(pesan)
            })
            .then(res => {
                if(res.ok) {
                    window.location.href = "sukses.html";
                } else {
                    alert("Gagal mengirim! Periksa Webhook URL Anda.");
                }
            })
            .catch(err => alert("Error: " + err));
        });
    </script>
</body>
</html>

<style>/* Reset & Font */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;

                url('uhui.png');
    color: white;
    height: 600px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* --- LANDING VIEW --- */
#landing-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 1s ease-in;
}

.logo-area {
    text-align: center;
    margin-bottom: 20px;
}

.main-logo {
    width: 100px;
    filter: drop-shadow(0 0 15px rgba(231, 76, 60, 0.4));
    margin-bottom: -45px;
}

h1 {

   
    font-size: 2.8rem;
    letter-spacing: 1px;
    color: #e74c3c;
    text-transform: uppercase;
    
    /* Tambahan kode di bawah ini */
    background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.8), transparent);
    padding: 15px 50px;
    display: inline-block;
}



.btn-masuk-awal {
    padding: 15px 40px;
    font-size: 1.1rem;
    background-color: #e74c3c;
    color: white;
    border: none;
    border-radius: 1px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
    letter-spacing: 1px;
}

.btn-masuk-awal:hover {
    background-color: #c0392b;
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
}

/* --- REGISTRATION VIEW --- */
#registration-view {
    display: none; /* Sembunyi di awal */
    width: 400px;
}

.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 30px 40px;
    border-radius: 15px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    animation: slideUp 0.5s ease-out;
}

.mini-logo {
    width: 60px;
    margin-bottom: -5px;
}

h2 {
    font-size: 1.4rem;
    margin-bottom: -30px;
    text-align: center;
    border-bottom: 2px solid #e74c3c;
    display: inline-block;
    width: 100%;
    padding-bottom: 50px;
}

/* --- FORM STYLING --- */
.input-group {
    margin-bottom: 5px; 
}

.input-group label {
    display: block;
    font-size: 0.8rem;
    color: #aaa;
    margin-bottom: 6px;
    text-transform: uppercase;
}

.input-group input, 
.input-group textarea {
    width: 100%;
    padding: 12px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    outline: none;
    transition: 0.3s;
}

.input-group input:focus, 
.input-group textarea:focus {
    border-color: #e74c3c;
}

textarea {
    height: 80px;
    resize: none;
}

.btn-register {
    width: 100%;
    padding: 14px;
    background-color: #e74c3c;
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.3s;
}

.btn-register:hover {
    background-color: #c0392b;
}

.cancel-text {
    text-align: center;
    margin-top: 15px;
    color: #666;
    font-size: 0.85rem;
    cursor: pointer;
}

.cancel-text:hover {
    color: #fff;
}

/* --- ANIMATIONS --- */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}</style>
